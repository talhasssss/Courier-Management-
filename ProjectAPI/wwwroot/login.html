<!doctype html>
<html lang="en">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <title>CTMS | Login Page v2</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <meta name="color-scheme" content="light dark" />

  <!-- Fonts -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/source-sans-3@5.0.12/index.css" crossorigin="anonymous" media="print" onload="this.media='all'" />

  <!-- OverlayScrollbars -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/overlayscrollbars@2.11.0/styles/overlayscrollbars.min.css" crossorigin="anonymous" />

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" crossorigin="anonymous" />

  <!-- Font Awesome for tracking icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <!-- Beautiful Modern Font: Inter (2025 top choice for web apps/dashboards) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- AdminLTE CSS (local) -->
  <link rel="stylesheet" href="css/adminlte.min.css" />
  <!-- Custom CTMS Styles (AFTER AdminLTE) -->
  <link rel="stylesheet" href="css/custom.css" />
  <style>
  #trackingResult .alert {
    border-radius: 12px;
  }
  #trackingResult .badge {
    padding: 8px 16px;
    font-size: 1.1em;
  }
</style>
</head>
<body class="login-page bg-body-secondary">

  <!-- Main Container with Tracking + Login Side by Side -->
  <div class="container mt-5">
    <div class="row justify-content-center align-items-start">
      
      <!-- Tracking Box (Blue Theme) - Left Side -->
      <div class="col-lg-5 col-md-6 mb-4 mb-md-0">
        <div class="card card-outline card-primary shadow h-100">
          <div class="card-header text-center bg-primary text-white">
            <h4><i class="fas fa-search me-2"></i>Track Your Package</h4>
          </div>
          <div class="card-body">
            <div class="input-group input-group-lg mb-3">
              <input type="text" id="trackingNumberInput" class="form-control" placeholder="Enter tracking number (e.g., TRK-ABCD1234)" />
              <button type="button" class="btn btn-primary" onclick="trackPackage()">
                <i class="fas fa-search"></i> Track
              </button>
            </div>
            <div id="trackingResult"></div>
          </div>
        </div>
      </div>

      <!-- Login Box - Right Side -->
      <div class="col-lg-4 col-md-6">
        <div class="login-box">
          <div class="card card-outline card-primary">
            <div class="card-header">
              <a href="#" class="link-dark text-center link-offset-2 link-opacity-100 link-opacity-50-hover">
                <h1 class="mb-0"><b>CTMS</b></h1>
              </a>
            </div>
            <div class="card-body login-card-body">
              <p class="login-box-msg">Sign in to start your session</p>

              <form id="loginForm">
                <div class="input-group mb-1">
                  <div class="form-floating">
                    <input id="loginEmail" type="email" class="form-control" required />
                    <label for="loginEmail">Email</label>
                  </div>
                  <div class="input-group-text"><span class="bi bi-envelope"></span></div>
                </div>
                <div class="input-group mb-1">
                  <div class="form-floating">
                    <input id="loginPassword" type="password" class="form-control" required />
                    <label for="loginPassword">Password</label>
                  </div>
                  <div class="input-group-text"><span class="bi bi-lock-fill"></span></div>
                </div>
                <div class="row">
                  <div class="col-8 d-inline-flex align-items-center">
                    <div class="form-check">
                      <input class="form-check-input" type="checkbox" id="rememberMe" />
                      <label class="form-check-label" for="rememberMe"> Remember Me </label>
                    </div>
                  </div>
                  <div class="col-4">
                    <div class="d-grid gap-2">
                      <button type="submit" class="btn btn-primary">Sign In</button>
                    </div>
                  </div>
                </div>
              </form>

              <p class="mb-1 mt-3"><a href="forgot-password.html">I forgot my password</a></p>
              <p class="mb-0">
                <a href="register-v2.html" class="text-center">Register a new membership</a>
              </p>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/overlayscrollbars@2.11.0/browser/overlayscrollbars.browser.es6.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.min.js" crossorigin="anonymous"></script>
  <script src="js/adminlte.min.js"></script>

  <!-- Public Tracking Script -->
  <script>
 async function trackPackage() {
  const trackingNumber = document.getElementById('trackingNumberInput').value.trim().toUpperCase();
  const resultDiv = document.getElementById('trackingResult');

  if (!trackingNumber) {
    resultDiv.innerHTML = '<div class="alert alert-warning">Please enter a tracking number</div>';
    return;
  }

  resultDiv.innerHTML = '<div class="text-center py-4"><div class="spinner-border text-primary"></div><p>Searching...</p></div>';

  try {
    const res = await fetch(`/api/Package/track/${trackingNumber}`);

    if (res.ok) {
      const pkg = await res.json();
      resultDiv.innerHTML = `
        <div class="alert alert-success">
          <h5>Package Found!</h5>
          <p><strong>Status:</strong> 
            <span class="badge bg-${pkg.status === 'DELIVERED' ? 'success' : 'warning'}">
              ${pkg.status || 'PENDING'}
            </span>
          </p>
          <p><strong>Delivery Address:</strong><br>${pkg.deliveryAddress || 'Not provided'}</p>
        </div>
      `;
    } else if (res.status === 404) {
      resultDiv.innerHTML = '<div class="alert alert-danger">Package not found</div>';
    } else {
      resultDiv.innerHTML = '<div class="alert alert-danger">Error checking package</div>';
    }
  } catch (err) {
    resultDiv.innerHTML = '<div class="alert alert-danger">Network error</div>';
  }
}
</script>

  <!-- Login Script -->
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;

      if (!email || !password) {
        alert('Please enter email and password');
        return;
      }

      try {
        const response = await fetch('/api/Auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        if (response.ok) {
  const data = await response.json();
  localStorage.setItem('token', data.token);
  localStorage.setItem('role', data.role);
  localStorage.setItem('userId', data.userId);  // ContactId
  localStorage.setItem('roleId', data.roleId);  // ← ADD THIS LINE
  window.location.href = 'dashboard.html';
} else {
          alert('Login failed: Invalid email or password');
        }
      } catch (err) {
        alert('Network error. Is the API running?');
        console.error(err);
      }
    });
  </script>

  <!-- OverlayScrollbars Configure -->
  <script>
    const SELECTOR_SIDEBAR_WRAPPER = '.sidebar-wrapper';
    const Default = {
      scrollbarTheme: 'os-theme-light',
      scrollbarAutoHide: 'leave',
      scrollbarClickScroll: true,
    };
    document.addEventListener('DOMContentLoaded', function () {
      const sidebarWrapper = document.querySelector(SELECTOR_SIDEBAR_WRAPPER);
      if (sidebarWrapper && typeof OverlayScrollbarsGlobal !== 'undefined') {
        OverlayScrollbarsGlobal.OverlayScrollbars(sidebarWrapper, {
          scrollbars: {
            theme: Default.scrollbarTheme,
            autoHide: Default.scrollbarAutoHide,
            clickScroll: Default.scrollbarClickScroll,
          },
        });
      }
    });
  </script>
</body>
</html>
