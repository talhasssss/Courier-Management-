<!doctype html>
<html lang="en">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <title>CTMS | Register Page v2</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <meta name="color-scheme" content="light dark" />

  <!-- Fonts -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/source-sans-3@5.0.12/index.css" crossorigin="anonymous" media="print" onload="this.media='all'" />
   <!-- Beautiful Modern Font: Inter (2025 top choice for web apps/dashboards) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- OverlayScrollbars -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/overlayscrollbars@2.11.0/styles/overlayscrollbars.min.css" crossorigin="anonymous" />

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" crossorigin="anonymous" />

  <!-- AdminLTE CSS (local from wwwroot/css) -->
  <link rel="stylesheet" href="css/adminlte.min.css" />
  <!-- Custom CTMS Styles (AFTER AdminLTE) -->
  <link rel="stylesheet" href="css/custom.css" />
  
</head>
<body class="register-page bg-body-secondary">
  <div class="register-box">
    <div class="card card-outline card-primary">
      <div class="card-header">
        <a href="#" class="link-dark text-center link-offset-2 link-opacity-100 link-opacity-50-hover">
          <h1 class="mb-0"><b>CTMS</b></h1>
        </a>
      </div>
      <div class="card-body register-card-body">
        <p class="register-box-msg">Register a new membership</p>

        <form id="registerForm">
          <div class="input-group mb-1">
            <div class="form-floating">
              <input id="registerFullName" type="text" class="form-control" placeholder="" required />
              <label for="registerFullName">Full Name</label>
            </div>
            <div class="input-group-text"><span class="bi bi-person"></span></div>
          </div>

          <div class="input-group mb-1">
            <div class="form-floating">
              <input id="registerEmail" type="email" class="form-control" placeholder="" required />
              <label for="registerEmail">Email</label>
            </div>
            <div class="input-group-text"><span class="bi bi-envelope"></span></div>
          </div>
           
          <div class="input-group mb-1">
            <div class="form-floating">
              <input id="registerPassword" type="password" class="form-control" placeholder="" required />
              <label for="registerPassword">Password</label>
            </div>
            <div class="input-group-text"><span class="bi bi-lock-fill"></span></div>
          </div>
        
          <div class="input-group mb-1">
            <div class="form-floating">
              <input id="registerPhone" type="tel"
              class="form-control" 
              placeholder="e.g., 923001234567" 
              pattern="92[0-9]{10}"
              title="Phone number must start with 92 followed by 10 digits (e.g., 923001234567)" 
              required />
              <label for="registerPhone">Phone Number (must start with 92)</label>
            </div>
            <div class="input-group-text"><span class="bi bi-phone"></span></div>
          </div>

          <!-- NEW: Address Field (Optional) -->
          <div class="input-group mb-1">
            <div class="form-floating">
              <textarea id="registerAddress" class="form-control" style="height: 50px" placeholder="Enter your address (optional)"></textarea>
              <label for="registerAddress">Address (optional)</label>
            </div>
            <div class="input-group-text"><span class="bi bi-house"></span></div>
          </div>


          <!-- Role Selection -->
          <div class="input-group mb-3">
            <select id="registerRole" class="form-select" required>
              <option value="Customer">Customer</option>
              <option value="Courier">Courier</option>
            </select>
            <div class="input-group-text"><span class="bi bi-person-badge"></span></div>
          </div>

          <div class="row">
            <div class="col-8 d-inline-flex align-items-center">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="termsCheck" required />
                <label class="form-check-label" for="termsCheck">
                  I agree to the <a href="#">terms</a>
                </label>
              </div>
            </div>
            <div class="col-4">
              <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary">Register</button>
              </div>
            </div>
          </div>
        </form>


        <p class="mb-0">
          <a href="login.html" class="link-primary text-center">I already have a membership</a>
        </p>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/overlayscrollbars@2.11.0/browser/overlayscrollbars.browser.es6.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.min.js" crossorigin="anonymous"></script>
  <script src="js/adminlte.min.js"></script>

  <!-- Register Script to Connect to Your API -->
  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const dto = {
        name: document.getElementById('registerFullName').value.trim(),
        email: document.getElementById('registerEmail').value.trim(),
        password: document.getElementById('registerPassword').value,
        phone: document.getElementById('registerPhone').value.trim(),
        address: document.getElementById('registerAddress').value.trim() || null,
        role: document.getElementById('registerRole').value
        // Add more fields if you extend the form (phone, address)
      };

      if (!dto.name || !dto.email || !dto.password || !dto.phone) {
        alert('Full Name, Email, Phone Number and Password are required');
        return;
      }

      if (!/^92[0-9]{10}$/.test(dto.phone)) {
      alert('Invalid phone number!\nMust be in format: 923001234567 (starts with 92, total 12 digits)');
      return;
      }

      if (!document.getElementById('termsCheck').checked) {
        alert('You must agree to the terms');
        return;
      }

      try {
        const response = await fetch('/api/Auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(dto)
        });

        if (response.ok) {
          const data = await response.json();
          localStorage.setItem('token', data.token);
          localStorage.setItem('role', data.role);
  localStorage.setItem('userId', data.userId);
  localStorage.setItem('roleId', data.roleId);  // ← ADD THIS LINE
          alert('Registration successful! Welcome ' + dto.name);
          window.location.href = 'dashboard.html';
        } else {
          const error = await response.text();
          alert('Registration failed: ' + (error || 'Please try again'));
        }
      } catch (err) {
        alert('Network error');
        console.error(err);
      }
    });
  </script>

  <!-- OverlayScrollbars Configure (kept from template) -->
  <script>
    const SELECTOR_SIDEBAR_WRAPPER = '.sidebar-wrapper';
    const Default = {
      scrollbarTheme: 'os-theme-light',
      scrollbarAutoHide: 'leave',
      scrollbarClickScroll: true,
    };
    document.addEventListener('DOMContentLoaded', function () {
      const sidebarWrapper = document.querySelector(SELECTOR_SIDEBAR_WRAPPER);
      if (sidebarWrapper && typeof OverlayScrollbarsGlobal !== 'undefined') {
        OverlayScrollbarsGlobal.OverlayScrollbars(sidebarWrapper, {
          scrollbars: {
            theme: Default.scrollbarTheme,
            autoHide: Default.scrollbarAutoHide,
            clickScroll: Default.scrollbarClickScroll,
          },
        });
      }
    });
  </script>
</body>
</html>
