<script>
// ================= AUTH & ROLE SETUP =================
const token = localStorage.getItem('token');
const role = localStorage.getItem('role') || 'Unknown';

if (!token) {
  window.location.href = 'login.html';
}

document.getElementById('userRoleDisplay').textContent = role;

// Hide all menus first
['createPackageMenu', 'myPackagesMenu', 'assignedPackagesMenu', 'allPackagesMenu', 'viewCouriersMenu', 'viewCustomersMenu', 'adminMenu'].forEach(id => {
  const el = document.getElementById(id);
  if (el) el.style.display = 'none';
});

// Show role-specific menus
if (role === 'Customer') {
  document.getElementById('createPackageMenu').style.display = 'block';
  document.getElementById('myPackagesMenu').style.display = 'block';
} else if (role === 'Courier') {
  document.getElementById('assignedPackagesMenu').style.display = 'block';
} else if (role === 'Admin') {
  document.getElementById('allPackagesMenu').style.display = 'block';
  document.getElementById('viewCouriersMenu').style.display = 'block';     // ← ADD
  document.getElementById('viewCustomersMenu').style.display = 'block';
  document.getElementById('adminMenu').style.display = 'block';
}

// ================= LOGOUT =================
function logout() {
  localStorage.clear();
  window.location.href = 'login.html';
}

// ================= DYNAMIC CONTENT LOADER =================
function loadContent(html) {
  document.getElementById('mainContent').innerHTML = html;
}

// ================= CUSTOMER: Create Package =================
function showCreatePackage() {
  const ratePerKg = 5.00;

  loadContent(`
    <div class="card">
      <div class="card-header">
        <h3 class="card-title">Create New Package</h3>
      </div>
      <div class="card-body">
        <form id="createPackageForm">
          <div class="mb-3">
            <label class="form-label">Delivery Address</label>
            <input type="text" class="form-control" id="deliveryAddress" placeholder="Enter full delivery address" required />
          </div>

          <div class="mb-3">
            <label class="form-label">Weight (kg)</label>
            <input type="number" step="0.01" min="0.01" class="form-control" id="packageWeight" required />
          </div>

          <div class="mb-3">
            <label class="form-label">Estimated Cost</label>
            <div class="input-group">
              <span class="input-group-text">$</span>
              <input type="text" class="form-control" id="packageCost" readonly value="0.00" />
            </div>
            <small class="text-muted">Rate: $${ratePerKg} per kg</small>
          </div>

          <button type="submit" class="btn btn-primary">Create Package</button>
        </form>
        <div id="createResult" class="mt-3"></div>
      </div>
    </div>
  `);

  const weightInput = document.getElementById('packageWeight');
  const costInput = document.getElementById('packageCost');

  weightInput.addEventListener('input', () => {
    const weight = parseFloat(weightInput.value);
    if (!isNaN(weight) && weight > 0) {
      costInput.value = (weight * ratePerKg).toFixed(2);
    } else {
      costInput.value = '0.00';
    }
  });

  document.getElementById('createPackageForm').onsubmit = async (e) => {
    e.preventDefault();
    const weight = parseFloat(weightInput.value);
    const address = document.getElementById('deliveryAddress').value.trim();

    if (isNaN(weight) || weight <= 0 || !address) {
      document.getElementById('createResult').innerHTML = '<div class="alert alert-danger">Please fill all fields correctly</div>';
      return;
    }

    try {
      const res = await fetch('/api/Package', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({ 
          weight: weight,
          deliveryAddress: address
        })
      });

      if (res.ok) {
        const data = await res.json();
        document.getElementById('createResult').innerHTML = `
          <div class="alert alert-success">
            <strong>Success!</strong><br>
            Tracking Number: <strong>${data.trackingNumber}</strong><br>
            Cost: <strong>$${(weight * ratePerKg).toFixed(2)}</strong>
          </div>
        `;
        weightInput.value = '';
        document.getElementById('deliveryAddress').value = '';
        costInput.value = '0.00';
      } else {
        const error = await res.text();
        document.getElementById('createResult').innerHTML = `<div class="alert alert-danger">${error}</div>`;
      }
    } catch (err) {
      document.getElementById('createResult').innerHTML = '<div class="alert alert-danger">Network error</div>';
    }
  };
}

// ================= CUSTOMER: My Packages (with Delivery Address) =================
function showMyPackages() {
  loadContent(`
    <div class="card">
      <div class="card-header">
        <h3 class="card-title">My Packages</h3>
      </div>
      <div class="card-body">
        <div id="loading" class="text-center py-4">
          <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
          </div>
          <p class="mt-2">Loading packages...</p>
        </div>
        <div id="packagesContent" style="display:none;"></div>
      </div>
    </div>
  `);

  fetch('/api/Package/my', {
    headers: { 
      'Authorization': 'Bearer ' + token
    }
  })
  .then(res => {
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  })
  .then(packages => {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('packagesContent').style.display = 'block';

    if (packages.length === 0) {
      document.getElementById('packagesContent').innerHTML = '<div class="alert alert-info">No packages found.</div>';
      return;
    }

    let html = `
      <table class="table table-bordered table-striped">
        <thead>
          <tr>
            <th>Tracking #</th>
            <th>Weight</th>
            <th>Delivery Address</th>
            <th>Cost</th>
            <th>Status</th>
            <th>Created</th>
          </tr>
        </thead>
        <tbody>`;

    packages.forEach(p => {
      html += `
        <tr>
          <td>${p.trackingNumber || 'N/A'}</td>
          <td>${p.weight || 0} kg</td>
          <td>${p.deliveryAddress || 'Not provided'}</td>
          <td>$${(p.cost || 0).toFixed(2)}</td>
          <td><span class="badge bg-${p.status === 'DELIVERED' ? 'success' : 'warning'}">${p.status || 'PENDING'}</span></td>
          <td>${p.createdAt ? new Date(p.createdAt).toLocaleString() : 'N/A'}</td>
        </tr>`;
    });

    html += `</tbody></table>`;
    document.getElementById('packagesContent').innerHTML = html;
  })
  .catch(err => {
    document.getElementById('loading').innerHTML = `<div class="alert alert-danger">Error: ${err.message}</div>`;
  });
}

function showAssignedPackages() {

      </div>
      <div class="card-body">

            <tr>
              <th>Tracking Number</th>
              <th>Weight</th>
              <th>Delivery Address</th>
              <th>Current Status</th>
              <th>Update Status</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  `);

  fetch('/api/Package/assigned', { headers: { 'Authorization': 'Bearer ' + token } })
    .then(res => res.json())
    .then(packages => {
      const tbody = document.querySelector('#assignedTable tbody');
      packages.forEach(p => {
        tbody.innerHTML += `
          <tr>
            <td><strong>${p.trackingNumber}</strong></td>
            <td>${p.weight} kg</td>
            <td>${p.deliveryAddress || 'Not provided'}</td>
            <td><span class="badge bg-${p.status === 'DELIVERED' ? 'success' : 'warning'} fs-5">${p.status}</span></td>
            <td>
              <select class="form-select" onchange="updatePackageStatus('${p.trackingNumber}', this.value)">
                <option value="">-- Select New Status --</option>
                <option value="IN_TRANSIT">In Transit</option>
                <option value="OUT_FOR_DELIVERY">Out for Delivery</option>
                <option value="DELIVERED">Delivered</option>
                <option value="FAILED_ATTEMPT">Failed Attempt</option>
              </select>
            </td>
          </tr>
        `;
      });
      $('#assignedTable').DataTable();
    });
}

// Admin: Assign Courier Function
async function assignCourier(trackingNumber) {
  // Simple prompt — you can make this a modal later
  const courierId = prompt(`Enter Courier ID for package ${trackingNumber}:`);

  if (!courierId || isNaN(courierId)) {
    alert('Invalid Courier ID');
    return;
  }

  try {
    const res = await fetch(`/api/Package/assign/${trackingNumber}/${courierId}`, {
      method: 'PUT',
      headers: { 'Authorization': 'Bearer ' + token }
    });

    if (res.ok) {
      const data = await res.json();
      alert(data.message);
      showAllPackages(); // Refresh list
    } else {
      const error = await res.text();
      alert('Failed: ' + error);
    }
  } catch (err) {
    alert('Network error');
  }
}

// ================= COURIER: Update Status =================
async function updatePackageStatus(trackingNumber, newStatus) {
  if (!newStatus || newStatus === "") {
    alert('Please select a new status');
    return;
  }

  try {
    const res = await fetch(`/api/Package/update-status/${trackingNumber}`, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token
      },
      body: JSON.stringify({ newStatus })
    });

    if (res.ok) {
      alert('Status updated successfully!');

      // Refresh the assigned packages table to show new status
      showAssignedPackages();
    } else {
      const error = await res.text();
      alert('Failed to update status: ' + error);
    }
  } catch (err) {
    alert('Network error. Please try again.');
    console.error(err);
  }
}
